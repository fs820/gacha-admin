<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理画面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>管理画面</h1>

    <h3>ピックアップ変更</h3>
    <div id="checkboxContainer_star5"></div>
    <div id="checkboxContainer_star4"></div>

    <button id="submitButton">決定</button>

    <h3>石の付与</h3>
    <input type="text" id="uid" placeholder="ユーザーID" style="font-size: 18px; padding: 5px;">
    <input type="number" id="amount" placeholder="付与する石の数" style="font-size: 18px; padding: 5px;">
    <br><br>
    <button onclick="addStone()" style="background-color: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">付与</button>

    <h3>ガチャ履歴の削除</h3>
    <button onclick="deleteHistory()" style="background-color: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">削除</button>

    <script src="script.js"></script>
</body>
</html>
